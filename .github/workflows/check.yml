name: Check Amazon

on:
  # Triggered every 10 min by an external cron (cron-job.org) hitting
  # POST /actions/workflows/check.yml/dispatches. We dropped the native
  # `schedule:` trigger because GitHub's scheduled runs were skipped /
  # delayed by 30-90 minutes during peak load (best-effort by design).
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: amazon-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    # Higher than typical: first run after adding booster-pack detection
    # walks every product page once. Subsequent runs only fetch new items.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci || npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install OpenVPN
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openvpn

      - name: Connect Surfshark VPN (HK exit)
        env:
          SURFSHARK_USER: ${{ secrets.SURFSHARK_USER }}
          SURFSHARK_PASS: ${{ secrets.SURFSHARK_PASS }}
        run: |
          # Auth credentials file (deleted on disconnect)
          umask 077
          printf '%s\n%s\n' "$SURFSHARK_USER" "$SURFSHARK_PASS" > /tmp/vpn-creds.txt

          # Connect — daemonised so the runner can keep going
          sudo openvpn \
            --config vpn-configs/hk-hkg.ovpn \
            --auth-user-pass /tmp/vpn-creds.txt \
            --daemon vpn-watcher \
            --log /tmp/openvpn.log \
            --writepid /tmp/openvpn.pid

          # Wait up to 30s for the tun0 interface to come up
          for i in $(seq 1 30); do
            if ip addr show tun0 2>/dev/null | grep -q 'inet '; then
              echo "VPN tunnel up after ${i}s"
              break
            fi
            sleep 1
          done

          if ! ip addr show tun0 2>/dev/null | grep -q 'inet '; then
            echo "VPN failed to connect within 30s — log tail:"
            sudo tail -n 30 /tmp/openvpn.log || true
            exit 1
          fi

          # Sanity check via Cloudflare's CDN-IP service (returns nothing sensitive)
          curl --max-time 10 -s https://cloudflare.com/cdn-cgi/trace | grep -E '^(loc|colo)=' || true

      - name: Run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scraper.js

      # IMPORTANT: do all outbound network steps (artifact upload, git push)
      # BEFORE disconnecting the VPN. Killing openvpn leaves stale routes on
      # tun0 long enough that subsequent connections SSL-timeout.

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit snapshot changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if git diff --quiet --cached; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore: update snapshots $(date -u +%Y-%m-%dT%H:%MZ)"
          # Concurrent runs both modify snapshots/*.json, so a plain rebase
          # hits content conflicts. -X theirs always keeps our (latest) scrape
          # on conflict — the older committed snapshot becomes obsolete the
          # moment our newer scrape lands anyway.
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push attempt $i rejected, rebasing on latest origin/main"
            git fetch origin main
            if ! git pull --rebase -X theirs origin main; then
              echo "rebase failed even with -X theirs, aborting and resetting"
              git rebase --abort || true
              git fetch origin main
              git reset --soft origin/main
              git commit -m "chore: update snapshots $(date -u +%Y-%m-%dT%H:%MZ) (after race)" || true
            fi
          done
          echo "push still failing after retries"
          exit 1

      - name: Disconnect VPN
        if: always()
        run: |
          sudo killall openvpn 2>/dev/null || true
          sudo rm -f /tmp/vpn-creds.txt /tmp/openvpn.pid /tmp/openvpn.log
          true
